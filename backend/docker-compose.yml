version: '3.9'

services:
  # FastAPI Application (Simple - SQLite based)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      - DATABASE_URL=sqlite:///app/data/crazy_lister.db
      - DEBUG=true
      - USE_AMAZON_MOCK=true
      - LOG_LEVEL=INFO
      - SP_API_CLIENT_ID=${SP_API_CLIENT_ID:-}
      - SP_API_CLIENT_SECRET=${SP_API_CLIENT_SECRET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=eu-west-1
    volumes:
      - app_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8765 --reload
    restart: unless-stopped

  # Amazon Mock API (for local testing)
  mock-api:
    build:
      context: ./amazon-mock-api
      dockerfile: Dockerfile
    ports:
      - "9500:9500"
    restart: unless-stopped

volumes:
  app_data:
